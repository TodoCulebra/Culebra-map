<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Explorer</title>
    
    <!-- 1. LEAFLET ENGINE -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <!-- 2. SEARCH PLUGIN -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { 
            height: 100vh; 
            width: 100%; 
            background: #aad3df; /* Light blue background while loading */
        }

        /* Button Styling */
        .leaflet-control-custom button {
            background: white !important;
            border: 2px solid rgba(0,0,0,0.2) !important;
            border-radius: 4px;
            width: 34px; height: 34px;
            cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        
        .leaflet-popup-content { font-size: 14px; line-height: 1.4; width: 280px !important; }
        .leaflet-popup-content img { border-radius: 8px; margin-bottom: 8px; width: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize map with a specific renderer to prevent grey screen
            var map = L.map('map', {
                center: [18.31, -65.30],
                zoom: 13,
                tap: false // Helps with mobile clicking
            });

            // Reliable Tile Layer
            L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            var locations = [
                { 
                    name: "Culebra Ferry Terminal", 
                    lat: 18.301451, lng: -65.302530, 
                    desc: "Our one and only Ferry Terminal! Arrive 1 hour early." 
                },
                { 
                    name: "Isla Culebrita", 
                    lat: 18.318654, lng: -65.227238, 
                    desc: "<img src='https://upload.wikimedia.org'>The Caribbean's last true virgin island! Book with <a href='https://www.gammyswatertours.com' target='_blank'>Gammy's</a>!" 
                },
                { 
                    name: "Punta Soldado", 
                    lat: 18.281876, lng: -65.286575, 
                    desc: "Southernmost beach with sunset views. Jeep/E-Bike only! Get one at <a href='https://www.todoculebra.com' target='_blank'>todoculebra.com</a>" 
                },
                { 
                    name: "Playa Datiles", 
                    lat: 18.296597, lng: -65.300179, 
                    desc: "Most romantic beach! Requires 4x4 or a capable E-Bike." 
                },
                { 
                    name: "Playa Melones", 
                    lat: 18.303469, lng: -65.310197, 
                    desc: "Marine reserve snorkeling. <a href='https://bluewatercharters.com' target='_blank'>bluewatercharters.com</a>" 
                },
                { 
                    name: "Playa Zoni", 
                    lat: 18.319636, lng: -65.254862, 
                    desc: "Beautiful 15 minute drive. Secluded vibe." 
                },
                { 
                    name: "Playa Flamenco", 
                    lat: 18.331667, lng: -65.318056, 
                    desc: "World famous white sands and WW2 tanks." 
                },
                { 
                    name: "Hector El Protector", 
                    lat: 18.300682, lng: -65.302170, 
                    desc: "<img src='https://www.discoverpuertorico.com'>Our wooden troll guardian!" 
                }
            ];

            locations.forEach(function(p) {
                L.marker([p.lat, p.lng]).addTo(map)
                    .bindPopup("<b>" + p.name + "</b><br>" + p.desc);
            });

            // 1. Search
            L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

            // 2. Home
            var HomeBtn = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function (map) {
                    var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    container.innerHTML = '<button type="button">🏠</button>';
                    container.onclick = function() { map.setView([18.31, -65.30], 13); };
                    return container;
                }
            });
            map.addControl(new HomeBtn());

            // 3. Toggle Fullscreen
            var FSBtn = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function (map) {
                    var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    container.innerHTML = '<button type="button">↕️</button>';
                    container.onclick = function() {
                        var elem = document.getElementById("map");
                        if (!document.fullscreenElement) { elem.requestFullscreen(); } 
                        else { document.exitFullscreen(); }
                    };
                    return container;
                }
            });
            map.addControl(new FSBtn());

            // FORCE RE-RENDER
            setTimeout(function() { 
                map.invalidateSize(); 
            }, 200);
        });
    </script>
</body>
</html>
