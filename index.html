<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Explorer Map</title>
    
    <!-- 1. LEAFLET ENGINE (Must be first) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <!-- 2. SEARCH BAR PLUGIN (Must be second) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        #map { height: 100vh; width: 100%; background: #ddd; }
        body { margin: 0; padding: 0; font-family: sans-serif; }

        /* Makes the custom Home/Fullscreen buttons look professional */
        .leaflet-control-custom button {
            background: white; border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px; width: 34px; height: 34px;
            cursor: pointer; font-size: 20px; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        .leaflet-control-custom button:hover { background-color: #f4f4f4; }
        .leaflet-popup-content { font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // A. Setup Map Instance
            var map = L.map('map').setView([18.31, -65.30], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // B. Your Location Data
            var locations = [
                { name: "Culebra Ferry Terminal", lat: 18.301451, lng: -65.302530, desc: "Arrive 1 hour early!" },
                { 
                    name: "Isla Culebrita", 
                    lat: 18.318654, 
                    lng: -65.227238, 
                    desc: "<img src='https://upload.wikimedia.org' style='width:100%;border-radius:8px;margin-bottom:8px;'><br>Virgin island paradise. Visit with <a href='https://www.gammyswatertours.com'>Gammy's</a>!" 
                },
                { name: "Punta Soldado", lat: 18.281876, lng: -65.286575, desc: "Sunset views. 4x4 or E-Bike only! No golf carts." },
                { name: "Playa Datiles", lat: 18.296597, lng: -65.300179, desc: "Romantic beach. Terrain is very rugged." },
                { name: "Playa Melones", lat: 18.303469, lng: -65.310197, desc: "Top tier snorkeling. <a href='https://bluewatercharters.com'>Blue Water Charters</a>" },
                { name: "Playa Zoni", lat: 18.319636, lng: -65.254862, desc: "Secluded vibes and views of St. Thomas." },
                { name: "Playa Flamenco", lat: 18.331667, lng: -65.318056, desc: "World famous white sand and iconic tanks." },
                { 
                    name: "Hector El Protector", 
                    lat: 18.300682, 
                    lng: -65.302170, 
                    desc: "<img src='https://www.discoverpuertorico.com' style='width:100%; border-radius:5px;'><br>The famous wooden troll guardian." 
                }
            ];

            // C. Add Markers (Fixed the loop and popup width)
            locations.forEach(function(p) {
                L.marker([p.lat, p.lng]).addTo(map)
                    .bindPopup("<b>" + p.name + "</b><br>" + p.desc, { maxWidth: 300 });
            });

            // D. FEATURE 1: Search Bar (Top Right)
            L.Control.geocoder({
                defaultMarkGeocode: true,
                placeholder: "Search Culebra..."
            }).addTo(map);

            // E. FEATURE 2: Re-center (Home) Button
            var HomeBtn = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function (map) {
                    var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    container.innerHTML = '<button type="button" title="Home">🏠</button>';
                    container.onclick = function() { map.setView([18.31, -65.30], 13); };
                    return container;
                }
            });
            map.addControl(new HomeBtn());

            // F. FEATURE 3: Fullscreen Toggle Button
            var FSBtn = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function (map) {
                    var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    container.innerHTML = '<button type="button" title="Fullscreen">↕️</button>';
                    container.onclick = function() {
                        var elem = document.getElementById("map");
                        if (!document.fullscreenElement) { elem.requestFullscreen(); } 
                        else { document.exitFullscreen(); }
                    };
                    return container;
                }
            });
            map.addControl(new FSBtn());

            // G. Geolocation Support (Circle for where you are)
            map.locate({setView: false, watch: true});
            map.on('locationfound', function(e) {
                L.circle(e.latlng, { radius: e.accuracy / 2, color: 'blue' }).addTo(map);
            });

            // Safari fix
            setTimeout(function(){ map.invalidateSize(); }, 500);
        });
    </script>
</body>
</html>
