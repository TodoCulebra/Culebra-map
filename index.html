<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Map - Fixed</title>
    
    <!-- Using Cloudflare CDN for maximum reliability on GitHub Pages -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com" />
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        /* CSS FIX: Explicitly set height and ensure no image conflicts */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { 
            height: 100vh; 
            width: 100%; 
            background: #cbd5e0; /* Grey placeholder while loading */
        }
        /* Prevents GitHub/Theme CSS from breaking map tiles */
        .leaflet-container img { max-width: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize map
            var map = L.map('map', {
                center: [18.31, -65.30],
                zoom: 13
            });

            // Use OpenStreetMap with a direct HTTPS link
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="http://www.openstreetmap.org">OpenStreetMap</a>'
            }).addTo(map);

            // Your Locations
            var locations = [
                { n: "Todo Culebra Plaza Hub", lt: 18.3012, lg: -65.30213 },
                { n: "Zaco's Tacos", lt: 18.300, lg: -65.29558 },
                { n: "Playa Flamenco", lt: 18.3280, lg: -65.3358 },
                { n: "Playa Zoni", lt: 18.3197, lg: -65.2757 }
            ];

            // Add Markers
            locations.forEach(function(p) {
                L.marker([p.lt, p.lg]).addTo(map).bindPopup(p.n);
            });

            // CRITICAL GITHUB PAGES FIX: 
            // Forces map to "wake up" after a tiny delay to fix the grey box bug
            setTimeout(function(){ 
                map.invalidateSize(); 
            }, 500);
        });
    </script>
</body>
</html>
