<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Explorer Map</title>
    
    <!-- Leaflet Core -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Search Control (Fixed Links) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        #map { height: 100vh; width: 100%; background: #ddd; }
        body { margin: 0; padding: 0; font-family: sans-serif; }
        /* Clean up custom buttons */
        .leaflet-control-custom button {
            background: white; border: none; width: 30px; height: 30px; 
            line-height: 30px; cursor: pointer; font-size: 16px; border-radius: 2px;
        }
        .leaflet-control-custom button:hover { background: #f4f4f4; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var map = L.map('map').setView([18.31, -65.30], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org">OpenStreetMap</a>'
            }).addTo(map);

            var locations = [
                { name: "Culebra Ferry Terminal", lat: 18.301451, lng: -65.302530, desc: "Arrive 1 hour early!" },
                { 
                    name: "Isla Culebrita", 
                    lat: 18.318654, 
                    lng: -65.227238, 
                    desc: "<img src='https://upload.wikimedia.org/wikipedia/commons/3/3f/Culebrita_Island%2C_Culebra_Island%2C_Puerto_Rico.jpg' style='width:100%;border-radius:8px;margin-bottom:8px;'><br>Virgin island paradise. Book with <a href='https://www.gammyswatertours.com' target='_blank'>Gammy's</a>!" 
                },
                { name: "Punta Soldado", lat: 18.281876, lng: -65.286575, desc: "Sunset views. 4x4 or E-Bike only! No golf carts." },
                { name: "Playa Datiles", lat: 18.296597, lng: -65.300179, desc: "Romantic & rugged. Best with a Jeep." },
                { name: "Playa Melones", lat: 18.303469, lng: -65.310197, desc: "Top tier snorkeling. <a href='https://bluewatercharters.com'>Blue Water Charters</a>" },
                { name: "Playa Zoni", lat: 18.319636, lng: -65.254862, desc: "Secluded vibes and views of St. Thomas." },
                { name: "Playa Flamenco", lat: 18.331667, lng: -65.318056, desc: "World famous beach with iconic tanks." },
                { 
                    name: "Hector El Protector", 
                    lat: 18.300682, 
                    lng: -65.302170, 
                    desc: "<img src='https://www.discoverpuertorico.com/sites/default/files/listing_images/profile/8059/Hector-El-Protector_69BCB335-5056-A36A-080F2CD5E9C0A166-69bcb26d5056a36_69bcb61d-5056-a36a-0867dfd14ace9c20.jpg' style='width:100%; border-radius:5px;'><br>The famous wooden troll." 
                }
            ];

            // Add Pins
            locations.forEach(function(p) {
                L.marker([p.lat, p.lng]).addTo(map)
                    .bindPopup("<b>" + p.name + "</b><br>" + p.desc);
            });

            // 1. Search Bar
            L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

            // 2. Geolocation
            map.locate({setView: false, watch: true});
            map.on('locationfound', function(e) {
                L.circle(e.latlng, { radius: e.accuracy / 2 }).addTo(map);
            });

            // 3. Home Button
            var HomeBtn = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function (map) {
                    var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    container.innerHTML = '<button onclick="location.reload()">🏠</button>';
                    return container;
                }
            });
            map.addControl(new HomeBtn());

            // 4. Fullscreen
            var FSBtn = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function (map) {
                    var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    container.innerHTML = '<button>↕️</button>';
                    container.onclick = function() {
                        var elem = document.getElementById("map");
                        if (!document.fullscreenElement) { elem.requestFullscreen(); } 
                        else { document.exitFullscreen(); }
                    }
                    return container;
                }
            });
            map.addControl(new FSBtn());

            setTimeout(function(){ map.invalidateSize(); }, 500);
        });
    </script>
</body>
</html>
