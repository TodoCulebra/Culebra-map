<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Map</title>
    
    <!-- FIXED: Correct Leaflet CSS and JavaScript CDN links -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        /* Ensures the map fills the entire screen */
        html, body, #map { 
            height: 100%; 
            width: 100%; 
            margin: 0; 
            padding: 0; 
            background: #eee; 
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        window.onload = function() {
            // Initialize the map and set view to Culebra
            var map = L.map('map').setView([18.31, -65.30], 13);

            // Load Map Tiles from OpenStreetMap
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Your Locations
            var locations = [
                { n: "Todo Culebra Plaza Hub", lt: 18.3012, lg: -65.30213 },
                { n: "Zaco's Tacos", lt: 18.300, lg: -65.29558 },
                { n: "Playa Flamenco", lt: 18.3280, lg: -65.3358 },
                { n: "Playa Zoni", lt: 18.3197, lg: -65.2757 }
            ];

            // Add markers for each location
            locations.forEach(function(p) {
                L.marker([p.lt, p.lg]).addTo(map).bindPopup(p.n);
            });

            // Force the map to recalculate dimensions after load
            setTimeout(function() {
                map.invalidateSize();
            }, 400);
        };
    </script>
</body>
</html>
