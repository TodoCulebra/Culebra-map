<!DOCTYPE html>
<html>
<head>
    <title>Culebra Map Fix</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FIXED: Using UNPKG for guaranteed direct file access -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; background: #ddd; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Start map
        var map = L.map('map').setView([18.31, -65.30], 13);

        // Load tiles
        L.tileLayer('https://tile.openstreetmap.org{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Your Pins
        var pins = [
            { n: "Todo Culebra Plaza Hub", lt: 18.3012, lg: -65.30213 },
            { n: "Zaco's Tacos", lt: 18.300, lg: -65.29558 },
            { n: "Playa Flamenco", lt: 18.3280, lg: -65.3358 },
            { n: "Playa Zoni", lt: 18.3197, lg: -65.2757 }
        ];

        pins.forEach(function(p) {
            L.marker([p.lt, p.lg]).addTo(map).bindPopup(p.n);
        });

        // Force redraw
        setTimeout(function() { map.invalidateSize(); }, 500);
    </script>
</body>
</html>
